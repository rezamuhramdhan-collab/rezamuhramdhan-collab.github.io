name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      # Pages is static hosting — the Payload admin/API can't run there.
      # Content comes from the hosted database (DATABASE_URI secret), the
      # same source the admin edits; the admin itself runs on Vercel.
      - name: Remove server-only Payload routes
        working-directory: site
        run: rm -rf 'app/(payload)'

      - name: Build static export
        working-directory: site
        run: npm run build
        env:
          STATIC_EXPORT: "1"
          PAYLOAD_SECRET: build-only-not-a-secret
          # Build from the hosted database (same source as the Vercel admin)
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          # Activates the Vercel Blob storage plugin so uploaded media URLs
          # resolve to the blob store; without it the build emits
          # /api/media/file/... URLs, which 404 on Pages (no API routes here).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
